      const saveProgress = (stageVal, levelVal, questionVal, answersVal, scoresVal, formVal) => {
        if (AUTO_TEST) return;
        try {
          localStorage.setItem('hebrewTestProgress', JSON.stringify({
            stage: stageVal, currentLevel: levelVal, currentQuestion: questionVal,
            answers: answersVal, scores: scoresVal, formData: formVal
          }));
        } catch(e) {}
      };

      const clearProgress = () => {
        try { localStorage.removeItem('hebrewTestProgress'); } catch(e) {}
      };

      const resumeSavedProgress = () => {
        try {
          const saved = JSON.parse(localStorage.getItem('hebrewTestProgress'));
          if (saved) {
            if (saved.formData) setFormData(saved.formData);
            if (saved.scores) setScores(saved.scores);
            if (saved.answers) setAnswers(saved.answers);
            setCurrentLevel(saved.currentLevel || 0);
            setCurrentQuestion(saved.currentQuestion || 0);
            setStage(saved.stage || 'levelIntro');
            setSavedDataExists(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        } catch(e) {}
      };

      const startFresh = () => {
        clearProgress();
        setSavedDataExists(false);
      };

      // שמור בכל שינוי מצב
      useEffect(() => {
        if (AUTO_TEST) return;
        if (stage === 'registration' || stage === 'final') return;
        saveProgress(stage, currentLevel, currentQuestion, answers, scores, formData);
      }, [stage, currentLevel, currentQuestion, answers, scores]);

      // ============ מצב בדיקה אוטומטי ============
      useEffect(() => {
        if (!AUTO_TEST) return;

        const sleep = (ms) => new Promise(r => setTimeout(r, ms));

        const run = async () => {
          await sleep(400);

          // שלב 1: מילוי הטופס
          setFormData({
            fullName: 'בדיקה אוטומטית',
            phone: '0501234567',
            location: 'בדיקה'
          });

          await sleep(SPEED);

          // שלב 2: התחל מבדק
          setStage('levelIntro');
        };

        run();
      }, []); // רץ פעם אחת בטעינה

      // מצב בדיקה: מעבר אוטומטי מ-levelIntro ל-test
      useEffect(() => {
        if (!AUTO_TEST) return;
        if (stage !== 'levelIntro') return;
        const t = setTimeout(() => setStage('test'), SPEED);
        return () => clearTimeout(t);
      }, [stage, currentLevel]);

      // מצב בדיקה: בחירת תשובה ומעבר לשאלה הבאה אוטומטית
      useEffect(() => {
        if (!AUTO_TEST) return;
        if (stage !== 'test') return;

        const t = setTimeout(() => {
          // בחר את התשובה הנכונה לפי מפתח התשובות
          const key = `${test.id}-${currentQuestion}`;
          const answer = test.correctAnswers[currentQuestion];
          setAnswers(prev => ({ ...prev, [key]: answer }));

          // עבור לשאלה הבאה (או סיים רמה)
          setTimeout(() => {
            if (currentQuestion < test.questions.length - 1) {
              setCurrentQuestion(q => q + 1);
              window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
              // חשב ציון וסיים רמה
              let score = 0;
              const allAnswers = { ...answers, [key]: answer };
              test.questions.forEach((_, i) => {
                if (allAnswers[`${test.id}-${i}`] === test.correctAnswers[i]) score += 4;
              });
              const newScores = [...scores];
              newScores[currentLevel] = score;
              setScores(newScores);
              setStage('levelResult');
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }
          }, SPEED);
        }, SPEED);

        return () => clearTimeout(t);
      }, [stage, currentQuestion, currentLevel]);

      // מצב בדיקה: בסוף רמה - המשך אוטומטי
      useEffect(() => {
        if (!AUTO_TEST) return;
        if (stage !== 'levelResult') return;

        const currentScore = scores[currentLevel];
        if (currentScore === null) return;

        const t = setTimeout(() => {
          const passed = currentScore >= PASSING_SCORE;
          if (passed && currentLevel < TESTS.length - 1) {
            setCurrentLevel(l => l + 1);
            setCurrentQuestion(0);
            setAnswers({});
            setStage('levelIntro');
          } else {
            // שלח נתונים וסיים
            const finalScores = [...scores];
            let lastPassedLevel = 'אף רמה';
            for (let i = 0; i < finalScores.length; i++) {
              if (finalScores[i] !== null && finalScores[i] >= PASSING_SCORE) {
                lastPassedLevel = TESTS[i].name;
              }
            }
            const lastAttemptedLevel = TESTS[currentLevel].name;
            const params = new URLSearchParams({
              firstName: 'בדיקה אוטומטית', lastName: '', phone: '0501234567',
              email: '', location: 'בדיקה',
              scoreA1: finalScores[0] !== null ? finalScores[0].toString() : '',
              scoreA2: finalScores[1] !== null ? finalScores[1].toString() : '',
              scoreB: finalScores[2] !== null ? finalScores[2].toString() : '',
              scoreC: finalScores[3] !== null ? finalScores[3].toString() : '',
              scoreD: finalScores[4] !== null ? finalScores[4].toString() : '',
              lastPassedLevel, lastAttemptedLevel, teacherCode: '', unified: 'true'
            });
            fetch(SHEET_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' }).catch(() => {});
            setStage('final');
          }
        }, SPEED * 2);

        return () => clearTimeout(t);
      }, [stage, scores, currentLevel]);

      const handleFormChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const isFormValid = () => {
        return formData.fullName && formData.phone && formData.location;
      };

      const startTest = () => {
        setStage('levelIntro');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const beginLevel = () => {
        setCurrentQuestion(0);
        setStage('test');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleAnswerSelect = (questionIndex, answer) => {
        setAnswers({ ...answers, [`${test.id}-${questionIndex}`]: answer });
      };

      const goToNextQuestion = () => {
        if (currentQuestion < test.questions.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          finishLevel();
        }
      };

      const goToPrevQuestion = () => {
        if (currentQuestion > 0) {
          setCurrentQuestion(currentQuestion - 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const calculateLevelScore = () => {
        let score = 0;
        test.questions.forEach((_, i) => {
          const userAnswer = answers[`${test.id}-${i}`];
          if (userAnswer === test.correctAnswers[i]) {
            score += POINTS_PER_QUESTION;
          }
        });
        return score;
      };

      const finishLevel = () => {
        const score = calculateLevelScore();
        const newScores = [...scores];
        newScores[currentLevel] = score;
        setScores(newScores);
        setStage('levelResult');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const continueToNextLevel = () => {
        if (currentLevel < TESTS.length - 1) {
          setCurrentLevel(currentLevel + 1);
          setCurrentQuestion(0);
          setStage('levelIntro');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          // סיימנו את כל המבדקים
          submitToSheet(scores.map((s, i) => i === currentLevel ? scores[currentLevel] : s));
          setStage('final');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const finishAfterFailure = () => {
        submitToSheet(scores);
        setStage('final');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const submitToSheet = (finalScores) => {
        if (dataSent) return;
        setDataSent(true);
        clearProgress(); // נקה localStorage

        // זיהוי הרמה האחרונה שעבר
        let lastPassedLevel = 'אף רמה';
        for (let i = 0; i < finalScores.length; i++) {
          if (finalScores[i] !== null && finalScores[i] >= PASSING_SCORE) {
            lastPassedLevel = TESTS[i].name;
          }
        }

        // זיהוי הרמה שבה נעצר
        const lastAttemptedLevel = TESTS[currentLevel].name;

        const params = new URLSearchParams({
          firstName: formData.fullName,
          lastName: '',
          phone: formData.phone,
          email: '',
          location: formData.location,
          scoreA1: finalScores[0] !== null ? finalScores[0].toString() : '',
          scoreA2: finalScores[1] !== null ? finalScores[1].toString() : '',
          scoreB: finalScores[2] !== null ? finalScores[2].toString() : '',
          scoreC: finalScores[3] !== null ? finalScores[3].toString() : '',
          scoreD: finalScores[4] !== null ? finalScores[4].toString() : '',
          lastPassedLevel: lastPassedLevel,
          lastAttemptedLevel: lastAttemptedLevel,
          teacherCode: formData.teacherCode || '',
          unified: 'true'
        });

        try {
          fetch(SHEET_URL + '?' + params.toString(), {
            method: 'GET',
            mode: 'no-cors'
          }).catch(err => console.log('Fetch error:', err));
        } catch (error) {
          console.log('Error sending data:', error);
        }
      };

      // ============ מסך רישום ============
      if (stage === 'registration') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8" dir="rtl">
            <div className="max-w-2xl mx-auto">

              {/* באנר המשך מנקודת עצירה */}
              {savedDataExists && (
                <div className="bg-amber-50 border-2 border-amber-400 rounded-xl p-5 mb-4 shadow-md">
                  <p className="text-lg font-bold text-amber-900 mb-1">
                    🔖 יש לך מבדק שהתחלת — רוצה להמשיך מהמקום שעצרת?
                  </p>
                  <p className="text-sm text-amber-700 mb-4">
                    لديك اختبار لم تكمله — هل تريد المتابعة من حيث توقفت؟
                  </p>
                  <div className="flex gap-3">
                    <button onClick={resumeSavedProgress}
                      className="px-5 py-2 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-lg transition-all">
                      המשך / تابع ←
                    </button>
                    <button onClick={startFresh}
                      className="px-5 py-2 bg-white hover:bg-gray-50 text-gray-600 font-semibold rounded-lg border border-gray-300 transition-all">
                      התחל מחדש / ابدأ من جديد
                    </button>
                  </div>
                </div>
              )}

            <div className="bg-white rounded-2xl shadow-xl p-8">
              <h1 className="text-4xl font-bold text-center text-indigo-900 mb-2">
                מבדק רמה בעברית
              </h1>
              <p className="text-center text-gray-600 mb-2 text-lg">
                امتحان المستوى في اللغة العبرية
              </p>
              <p className="text-center text-gray-500 mb-8 text-sm">
                המבדק בנוי מ-5 רמות. ככל שתצליח, תתקדם לרמה הבאה.
              </p>
              <p className="text-center text-gray-500 mb-8 text-sm">
                الاختبار مبني من 5 مستويات. كلما نجحت، تقدمت إلى المستوى التالي.
              </p>

              <div className="space-y-6">
                <div>
                  <label className="block text-lg font-semibold text-gray-700 mb-2">
                    שם מלא <span className="text-sm font-normal text-gray-500">(الاسم الكامل)</span>
                  </label>
                  <input type="text" name="fullName" value={formData.fullName} onChange={handleFormChange}
                    className="w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none" />
                </div>

                <div>
                  <label className="block text-lg font-semibold text-gray-700 mb-2">
                    מקום בארץ <span className="text-sm font-normal text-gray-500">(المكان في البلاد)</span>
                  </label>
                  <input type="text" name="location" value={formData.location} onChange={handleFormChange}
                    className="w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none" />
                </div>

                <div>
                  <label className="block text-lg font-semibold text-gray-700 mb-2">
                    קוד מורה <span className="text-sm font-normal text-gray-400">(אופציונלי)</span>
                    <span className="block text-sm font-normal text-gray-400 mt-1">كود المعلم (اختياري)</span>
                  </label>
                  <input type="text" name="teacherCode" value={formData.teacherCode} onChange={handleFormChange}
                    placeholder="למשל: AB1234"
                    className="w-full px-4 py-3 text-lg border-2 border-gray-200 rounded-lg focus:border-indigo-400 focus:outline-none bg-gray-50" />
                </div>

                <button onClick={startTest} disabled={!isFormValid()}
                  className={`w-full py-4 text-xl font-bold rounded-lg transition-all ${
                    isFormValid()
                      ? 'bg-indigo-600 hover:bg-indigo-700 text-white cursor-pointer'
                      : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                  }`}>
                  התחל מבדק
                  <br />
                  <span className="text-base font-normal">ابدأ الاختبار</span>
                </button>
              </div>
            </div>

              <p className="text-center text-gray-300 text-xs mt-6 leading-relaxed">
                המבדק נכתב ע"י ד"ר יהודית גולן בן אורי ©<br />
                האתר נבנה ע"י מיכאל קיסלוק (2026)
              </p>
            </div>
          </div>
        );
      }

      // ============ מסך הקדמה לרמה ============
      if (stage === 'levelIntro') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8 flex items-center justify-center" dir="rtl">
            <div className="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-12 text-center">
              <div className="mb-4 text-gray-500 text-lg">
                רמה {currentLevel + 1} מתוך {TESTS.length}
                <span className="mx-2 text-gray-300">|</span>
                <span className="text-base">المستوى {currentLevel + 1} من {TESTS.length}</span>
              </div>
              <h1 className="text-5xl font-bold text-indigo-900 mb-2">
                {test.name}
              </h1>
              <p className="text-xl text-gray-600 mb-6">{test.nameAr}</p>

              <div className="bg-indigo-50 border-2 border-indigo-200 rounded-lg p-6 mb-8">
                <p className="text-lg text-gray-700 mb-1">
                  <span className="font-bold">25</span> שאלות
                  {test.story && <span> • כולל קטע קריאה</span>}
                </p>
                <p className="text-sm text-gray-500 mb-3">
                  {test.story ? '٢٥ سؤالاً • يشمل نصاً للقراءة' : '٢٥ سؤالاً'}
                </p>
                <p className="text-base text-gray-600 mb-1">
                  כדי לעבור לרמה הבאה צריך להגיע לציון <span className="font-bold">{PASSING_SCORE}</span> לפחות
                </p>
                <p className="text-sm text-gray-500">
                  للانتقال إلى المستوى التالي، يجب الحصول على <span className="font-bold">{PASSING_SCORE}</span> نقطة على الأقل
                </p>
              </div>

              <button onClick={beginLevel}
                className="px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-bold rounded-lg transition-all">
                מתחילים! ← <span className="text-base font-normal">/ لنبدأ!</span>
              </button>
            </div>
          </div>
        );
      }

      // ============ מסך המבדק ============
      if (stage === 'test') {
        const currentQ = test.questions[currentQuestion];
        const progress = ((currentQuestion + 1) / test.questions.length) * 100;
        const selectedAnswer = answers[`${test.id}-${currentQuestion}`];

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8" dir="rtl">
            <div className="max-w-3xl mx-auto">
              {/* באנר רמה */}
              <div className="bg-indigo-600 text-white rounded-lg shadow-md p-3 mb-4 text-center">
                <span className="font-bold">מבדק רמה - {test.name}</span>
                <span className="mx-2">|</span>
                <span className="text-indigo-100">רמה {currentLevel + 1} מתוך {TESTS.length}</span>
              </div>

              {/* progress */}
              <div className="bg-white rounded-lg shadow-md p-4 mb-6">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-lg font-semibold text-gray-700">
                    שאלה {currentQuestion + 1} מתוך {test.questions.length}
                  </span>
                  <span className="text-lg font-semibold text-indigo-600">{Math.round(progress)}%</span>
                </div>
                <div className="w-full bg-gray-200 rounded-full h-3">
                  <div className="bg-indigo-600 h-3 rounded-full transition-all duration-300"
                    style={{ width: `${progress}%` }}></div>
                </div>
              </div>

              {/* תיבת סיפור */}
              {currentQ.hasStory && test.story && (
                <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-6 mb-6 shadow-md">
                  <h3 className="text-xl font-bold text-amber-900 mb-2 text-center">
                    קרא/י את הטקסט והשב/י על השאלות
                  </h3>
                  <h3 className="text-lg font-semibold text-amber-800 mb-4 text-center">
                    اقرأ/ي النص وأجب/أجيبي على الأسئلة
                  </h3>
                  <h4 className="text-xl font-bold text-amber-900 mb-3 text-center">
                    {test.story.title}
                  </h4>
                  <p className="text-lg leading-relaxed text-gray-800 whitespace-pre-line">
                    {test.story.text}
                  </p>
                </div>
              )}

              {/* שאלה */}
              <div className="bg-white rounded-2xl shadow-xl p-8">
                <h2 className="text-2xl font-bold text-gray-800 mb-8 leading-relaxed whitespace-pre-line">
                  {currentQ.question}
                </h2>

                <div className="space-y-4">
                  {currentQ.options.map((option, idx) => {
                    const letter = LETTERS[idx];
                    const isSelected = selectedAnswer === letter;
                    return (
                      <label key={idx}
                        className={`flex items-center p-4 rounded-lg cursor-pointer border-2 transition-all ${
                          isSelected
                            ? 'border-indigo-600 bg-indigo-50'
                            : 'border-gray-200 hover:border-indigo-300 hover:bg-gray-50'
                        }`}>
                        <input type="radio" name={`q-${currentQuestion}`} value={letter}
                          checked={isSelected} onChange={() => handleAnswerSelect(currentQuestion, letter)}
                          className="ml-4 w-5 h-5 accent-indigo-600" />
                        <span className="text-lg text-gray-800">
                          <span className="font-bold ml-2">{letter}.</span>
                          {option}
                        </span>
                      </label>
                    );
                  })}
                </div>

                <div className="flex justify-between mt-8 gap-4">
                  <button onClick={goToPrevQuestion} disabled={currentQuestion === 0}
                    className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                      currentQuestion === 0
                        ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                        : 'bg-gray-200 hover:bg-gray-300 text-gray-700'
                    }`}>
                    → הקודם
                  </button>
                  <button onClick={goToNextQuestion} disabled={!selectedAnswer}
                    className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                      !selectedAnswer
                        ? 'bg-gray-300 text-gray-500 cursor-not-allowed'
                        : 'bg-indigo-600 hover:bg-indigo-700 text-white'
                    }`}>
                    {currentQuestion === test.questions.length - 1 ? 'סיום הרמה' : 'הבא'} ←
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ============ מסך תוצאת הרמה ============
      if (stage === 'levelResult') {
        const score = scores[currentLevel];
        const passed = score >= PASSING_SCORE;
        const isLastLevel = currentLevel === TESTS.length - 1;

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8 flex items-center justify-center" dir="rtl">
            <div className="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-12 text-center">
              <div className={`w-32 h-32 mx-auto mb-6 rounded-full flex items-center justify-center ${
                passed ? 'bg-green-100' : 'bg-blue-100'
              }`}>
                <span className={`text-6xl font-bold ${passed ? 'text-green-600' : 'text-blue-600'}`}>
                  {score}
                </span>
              </div>

              <h2 className="text-3xl font-bold text-gray-800 mb-2">
                מבדק רמה - {test.name}
              </h2>
              <p className="text-xl text-gray-600 mb-1">
                הציון שלך: {score} מתוך 100
              </p>
              <p className="text-base text-gray-400 mb-6">
                نتيجتك: {score} من 100
              </p>

              {passed ? (
                <>
                  {isLastLevel ? (
                    <>
                      <p className="text-2xl text-green-600 font-bold mb-1">
                        🎉 כל הכבוד! עברת את כל הרמות!
                      </p>
                      <p className="text-base text-green-500 mb-6">أحسنت! اجتزت جميع المستويات!</p>
                      <button onClick={continueToNextLevel}
                        className="px-10 py-4 bg-green-600 hover:bg-green-700 text-white text-xl font-bold rounded-lg transition-all">
                        סיום המבדק / انهاء الاختبار
                      </button>
                    </>
                  ) : (
                    <>
                      <p className="text-2xl text-green-600 font-semibold mb-1">
                        כל הכבוד! עברת לרמה הבאה
                      </p>
                      <p className="text-base text-green-500 mb-3">أحسنت! انتقلت إلى المستوى التالي</p>
                      <p className="text-lg text-gray-600 mb-1">
                        הרמה הבאה: <span className="font-bold">{TESTS[currentLevel + 1].name}</span>
                      </p>
                      <p className="text-sm text-gray-400 mb-6">
                        المستوى التالي: <span className="font-bold">{TESTS[currentLevel + 1].nameAr}</span>
                      </p>
                      <button onClick={continueToNextLevel}
                        className="px-10 py-4 bg-green-600 hover:bg-green-700 text-white text-xl font-bold rounded-lg transition-all">
                        המשך לרמה הבאה ← / تابع للمستوى التالي
                      </button>
                      <div className="mt-4">
                        <button onClick={finishAfterFailure}
                          className="px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-600 text-base rounded-lg transition-all border border-gray-300">
                          סיים כאן / أنهِ هنا
                        </button>
                      </div>
                    </>
                  )}
                </>
              ) : (
                <>
                  <p className="text-xl text-gray-700 mb-1">
                    כל הכבוד על המאמץ!
                  </p>
                  <p className="text-base text-gray-400 mb-8">أحسنت!</p>
                  <button onClick={finishAfterFailure}
                    className="px-10 py-4 bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-bold rounded-lg transition-all">
                    לסיכום המבדק / ملخص الاختبار
                  </button>
                </>
              )}

              <div className="mt-8 pt-8 border-t border-gray-200">
                <p className="text-gray-600">
                  <span className="font-semibold">{formData.fullName}</span>
                </p>
              </div>
            </div>
          </div>
        );
      }

      // ============ מסך סיכום סופי ============
      if (stage === 'final') {
        // זיהוי הרמה הגבוהה ביותר שעבר
        let highestPassed = null;
        for (let i = 0; i < scores.length; i++) {
          if (scores[i] !== null && scores[i] >= PASSING_SCORE) {
            highestPassed = TESTS[i].name;
          }
        }

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50 p-4 md:p-8" dir="rtl">
            <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8 md:p-12">
              <h1 className="text-4xl font-bold text-center text-indigo-900 mb-1">
                סיכום המבדק
              </h1>
              <p className="text-center text-gray-400 mb-4">ملخص الاختبار</p>
              <p className="text-center text-gray-600 mb-8 text-lg">
                {formData.fullName}
              </p>

              {highestPassed ? (
                <div className="bg-green-50 border-2 border-green-300 rounded-lg p-6 mb-8 text-center">
                  <p className="text-lg text-gray-700 mb-1">הרמה שלך: <span className="text-sm text-gray-400">/ مستواك:</span></p>
                  <p className="text-4xl font-bold text-green-700">{highestPassed}</p>
                </div>
              ) : (
                <div className="bg-blue-50 border-2 border-blue-300 rounded-lg p-6 mb-8 text-center">
                  <p className="text-xl text-blue-700 mb-1">כל הכבוד על המאמץ!</p>
                  <p className="text-base text-blue-400">أحسنت!</p>
                </div>
              )}

              <div className="space-y-3 mb-8">
                <h3 className="text-xl font-bold text-gray-800 mb-1">תוצאות לפי רמה: <span className="text-sm font-normal text-gray-400">/ النتائج حسب المستوى:</span></h3>
                {TESTS.map((t, i) => {
                  const s = scores[i];
                  const didTake = s !== null;
                  const didPass = didTake && s >= PASSING_SCORE;

                  return (
                    <div key={t.id}
                      className={`flex items-center justify-between p-4 rounded-lg border-2 ${
                        !didTake ? 'border-gray-200 bg-gray-50' :
                        didPass ? 'border-green-300 bg-green-50' :
                        'border-blue-300 bg-blue-50'
                      }`}>
                      <div className="flex items-center">
                        <span className="text-xl ml-3">
                          {!didTake ? '⏸️' : didPass ? '✅' : '📝'}
                        </span>
                        <span className="font-semibold text-gray-800">
                          מבדק {t.name}
                        </span>
                      </div>
                      <div className="text-left">
                        {didTake ? (
                          <span className={`text-2xl font-bold ${didPass ? 'text-green-700' : 'text-blue-700'}`}>
                            {s}
                          </span>
                        ) : (
                          <span className="text-gray-400 text-sm">לא בוצע / لم يُجرَ</span>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="pt-6 border-t border-gray-200 text-center">
                <p className="text-gray-600 text-sm">
                  התוצאות נשמרו. תודה שהשתתפת!
                  <br />
                  <span className="text-gray-400">تم حفظ النتائج. شكراً لمشاركتك!</span>
                </p>
              </div>
            </div>
          </div>
        );
      }

      return null;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HebrewLevelTest />);
  </script>
</body>
</html>
